name: Get-in-Line-Katalog aktualisieren

on:
  workflow_dispatch:
    inputs:
      full_refresh:
        description: Alle Seiten neu einlesen
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '25 3 * * 1'

permissions:
  contents: write

concurrency:
  group: getinline-catalog
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 330

    steps:
      - name: Repository laden
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Katalog aktualisieren
        shell: bash
        run: |
          EXTRA=""
          if [ "${{ github.event.inputs.full_refresh }}" = "true" ]; then
            EXTRA="--full"
          fi
          node tools/sync-getinline.js --concurrency=3 --delay=300 $EXTRA

      - name: Geänderte Daten speichern
        shell: bash
        run: |
          if git diff --quiet -- data/getinline-dances.json assets/getinline-data.js data/getinline-sync-checkpoint.json 2>/dev/null && [ -z "$(git status --porcelain -- data/getinline-dances.json assets/getinline-data.js data/getinline-sync-checkpoint.json)" ]; then
            echo "Keine Änderungen."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A data/getinline-dances.json assets/getinline-data.js data/getinline-sync-checkpoint.json
          git commit -m "Get-in-Line-Katalog aktualisieren"
          git push
