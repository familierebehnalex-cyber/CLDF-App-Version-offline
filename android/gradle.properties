org.gradle.jvmargs=-Xmx3g -Dfile.encoding=UTF-8
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true

# Standardmäßig wird die öffentliche CLDF-Web-App geladen.
# Kann lokal überschrieben werden, ohne den Quellcode zu ändern:
# CLDF_APP_URL=https://deine-app-adresse.example/
#
# Empfohlen: kurzlebigen Apple-Developer-Token über HTTPS liefern:
# CLDF_SHAZAM_TOKEN_ENDPOINT=https://dein-server.example/api/shazam-token
#
# Nur für einen privaten Test-Build, nicht für GitHub/Veröffentlichung:
# CLDF_SHAZAM_STATIC_TOKEN=eyJhbGciOiJFUzI1NiIs...
