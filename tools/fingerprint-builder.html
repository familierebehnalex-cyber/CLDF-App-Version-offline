<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CLDF Audio-Fingerprints</title>
  <style>body{font:17px/1.5 system-ui;max-width:850px;margin:35px auto;padding:0 18px;color:#2f2119}button,label{display:inline-block;margin:8px 6px 8px 0;padding:12px 16px;border:1px solid #9d6335;border-radius:10px;background:#fff7e8;font-weight:700}progress{width:100%;height:18px}pre{white-space:pre-wrap;background:#f7efe3;padding:12px;border-radius:10px}</style>
</head>
<body>
  <h1>CLDF Audio-Fingerprints</h1>
  <p>Dieses Werkzeug verarbeitet eigene Musikdateien lokal. Es speichert keine Musik, sondern nur akustische Merkmale.</p>
  <label>Musikdateien auswählen <input id="files" type="file" accept="audio/*" multiple></label>
  <button id="download" disabled>Fingerprint-Datei speichern</button>
  <progress id="progress" max="100" value="0"></progress>
  <pre id="status">Bereit.</pre>
  <script src="../assets/audio-engine.js"></script>
  <script>
    const entries=[];
    const status=document.querySelector('#status');
    const progress=document.querySelector('#progress');
    const download=document.querySelector('#download');
    const clean=name=>name.replace(/\.[^.]+$/,'').replace(/_/g,' ').trim();
    document.querySelector('#files').addEventListener('change',async event=>{
      entries.length=0;
      const files=[...event.target.files];
      for(let i=0;i<files.length;i++){
        const file=files[i];
        try{
          status.textContent=`${i+1}/${files.length}: ${file.name}`;
          const audio=await CLDFAudioEngine.decodeBlob(file);
          const fp=await CLDFAudioEngine.extractFingerprint(audio,{maxSeconds:480,onProgress:p=>progress.value=p});
          const base=clean(file.name);
          const parts=base.split(/\s+-\s+/);
          const artist=parts.length>1?parts.shift():'';
          const title=parts.length?parts.join(' - '):base;
          entries.push({id:`tool-${Date.now()}-${i}`,title,artist,songKey:`${title.toLowerCase()}|${artist.toLowerCase()}`,fileName:file.name,duration:fp.duration,bpm:fp.bpm,algorithm:fp.algorithm,sampleRate:fp.sampleRate,frameSize:fp.frameSize,hopSize:fp.hopSize,hashes:Array.from(fp.hashes),times:Array.from(fp.times),createdAt:new Date().toISOString()});
        }catch(error){console.error(error);status.textContent+=`\nFehler: ${error.message}`;}
      }
      progress.value=100;
      status.textContent=`${entries.length} Fingerprint${entries.length===1?'':'s'} erstellt.`;
      download.disabled=!entries.length;
    });
    download.addEventListener('click',()=>{
      const payload={format:'CLDF-AUDIO-FINGERPRINTS',version:2,algorithm:'cldf-landmark-v1',exportedAt:new Date().toISOString(),count:entries.length,entries};
      const blob=new Blob([JSON.stringify(payload)],{type:'application/json'});
      const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='CLDF-Audio-Fingerprints.json';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000);
    });
  </script>
</body>
</html>
